[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Vite variables are intentionally public because they are embedded in the client bundle.
  # Netlify secrets scanning can flag some of these values as false positives.
  SECRETS_SCAN_OMIT_KEYS = "VITE_API_BASE_URL,VITE_API_PROXY_TARGET,VITE_DASHBOARD_PREVIEW_LIMIT,VITE_DASHBOARD_UPCOMING_CASH_WINDOW_DAYS,VITE_GOOGLE_CLIENT_ID,VITE_GOOGLE_DRIVE_BACKUP_FOLDER_NAME,VITE_GOOGLE_DRIVE_SCOPE,VITE_GOOGLE_IDENTITY_SCRIPT_URL,VITE_GOOGLE_ACCESS_TOKEN_REFRESH_SKEW_SECONDS,VITE_SESSION_ACTIVITY_THROTTLE_SECONDS,VITE_SESSION_TIMEOUT_MINUTES,VITE_SESSION_WARNING_MINUTES,VITE_DEPOSIT_MATURING_SOON_WINDOW_DAYS,VITE_DEPOSIT_GROUP_SECTION_LIMIT,VITE_GOOGLE_DRIVE_API_PAGE_SIZE,VITE_DEFAULT_BACKUP_DESTINATION"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
